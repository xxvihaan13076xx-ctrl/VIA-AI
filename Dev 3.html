<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIA AI — Cure Boredom</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #020408;
    --surface: #080d14;
    --card: #0b1220;
    --border: #1a2840;
    --cyan: #00e5ff;
    --green: #00ff88;
    --magenta: #ff00c8;
    --orange: #ff6d00;
    --gold: #ffd600;
    --red: #ff1744;
    --blue: #2979ff;
    --purple: #d500f9;
    --text: #c8d8f0;
    --muted: #4a6080;
    --white: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
    pointer-events: none;
  }

  /* Ambient glows */
  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,229,255,0.04) 0%, transparent 70%);
    top: -200px; left: -200px;
    pointer-events: none;
    z-index: 0;
  }

  /* ===== HEADER ===== */
  .hud-bar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(2,4,8,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 15px;
  }

  .hud-logo {
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem;
    font-weight: 900;
    color: var(--cyan);
    text-shadow: 0 0 20px var(--cyan);
    letter-spacing: 4px;
    white-space: nowrap;
  }

  .hud-stats {
    display: flex;
    align-items: center;
    gap: 15px;
    flex: 1;
    justify-content: flex-end;
  }

  .stat-chip {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    white-space: nowrap;
  }

  .stat-chip span { color: var(--magenta); font-size: 0.9rem; font-weight: bold; }

  .xp-track {
    flex: 1; max-width: 200px;
    height: 6px; background: #0d1a2a;
    border-radius: 3px; overflow: hidden;
    border: 1px solid var(--border);
  }

  .xp-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--cyan), var(--magenta));
    box-shadow: 0 0 10px var(--cyan);
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  /* ===== MAIN ===== */
  main {
    position: relative; z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 30px 16px 80px;
  }

  /* ===== TITLE SECTION ===== */
  .hero {
    text-align: center;
    margin-bottom: 35px;
  }

  .hero-title {
    font-family: 'Orbitron', monospace;
    font-size: 2.8rem;
    font-weight: 900;
    color: var(--white);
    text-shadow: 0 0 30px rgba(0,229,255,0.5);
    letter-spacing: 8px;
    line-height: 1;
  }

  .hero-title span { color: var(--cyan); }

  .hero-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 3px;
    margin-top: 8px;
  }

  /* ===== QUICK CATEGORY CHIPS ===== */
  .category-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
    justify-content: center;
  }

  .cat-chip {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .cat-chip:hover, .cat-chip.active {
    border-color: var(--cyan);
    color: var(--cyan);
    box-shadow: 0 0 10px rgba(0,229,255,0.2);
    background: rgba(0,229,255,0.05);
  }

  .cat-chip[data-cat="football"]:hover, .cat-chip[data-cat="football"].active { border-color: var(--green); color: var(--green); box-shadow: 0 0 10px rgba(0,255,136,0.2); background: rgba(0,255,136,0.05); }
  .cat-chip[data-cat="cricket"]:hover, .cat-chip[data-cat="cricket"].active { border-color: var(--orange); color: var(--orange); box-shadow: 0 0 10px rgba(255,109,0,0.2); background: rgba(255,109,0,0.05); }
  .cat-chip[data-cat="cooking"]:hover, .cat-chip[data-cat="cooking"].active { border-color: var(--gold); color: var(--gold); box-shadow: 0 0 10px rgba(255,214,0,0.2); background: rgba(255,214,0,0.05); }
  .cat-chip[data-cat="exercise"]:hover, .cat-chip[data-cat="exercise"].active { border-color: var(--red); color: var(--red); box-shadow: 0 0 10px rgba(255,23,68,0.2); background: rgba(255,23,68,0.05); }
  .cat-chip[data-cat="sleep"]:hover, .cat-chip[data-cat="sleep"].active { border-color: var(--purple); color: var(--purple); box-shadow: 0 0 10px rgba(213,0,249,0.2); background: rgba(213,0,249,0.05); }
  .cat-chip[data-cat="mind"]:hover, .cat-chip[data-cat="mind"].active { border-color: var(--blue); color: var(--blue); box-shadow: 0 0 10px rgba(41,121,255,0.2); background: rgba(41,121,255,0.05); }

  /* ===== SEARCH CARD ===== */
  .input-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .input-row {
    position: relative;
    margin-bottom: 15px;
  }

  .input-row input {
    width: 100%;
    padding: 14px 50px 14px 16px;
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--white);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 1px;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-row input:focus { border-color: var(--cyan); box-shadow: 0 0 0 2px rgba(0,229,255,0.1); }
  .input-row input::placeholder { color: var(--muted); font-weight: 400; }

  .input-icon {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 1.1rem; pointer-events: none;
  }

  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  @media(max-width: 380px) { .btn-row { grid-template-columns: 1fr; } }

  .btn {
    padding: 13px 10px;
    border-radius: 10px;
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s;
    border: 2px solid;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-a { border-color: var(--cyan); color: var(--cyan); }
  .btn-a:hover:not(:disabled) { background: var(--cyan); color: #000; box-shadow: 0 0 20px var(--cyan); }

  .btn-b { border-color: var(--orange); color: var(--orange); }
  .btn-b:hover:not(:disabled) { background: var(--orange); color: #000; box-shadow: 0 0 20px var(--orange); }

  .btn-random {
    width: 100%; margin-top: 10px;
    border-color: var(--magenta); color: var(--magenta);
  }
  .btn-random:hover:not(:disabled) { background: var(--magenta); color: #000; box-shadow: 0 0 20px var(--magenta); }

  /* ===== CONSOLE ===== */
  .console {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    color: var(--cyan);
    min-height: 1.2rem;
    margin-bottom: 12px;
    padding-left: 4px;
    opacity: 0.7;
  }

  /* ===== ACTIVITY CARDS ===== */
  .activity-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    border-left: 5px solid var(--cyan);
    animation: slideUp 0.4s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 3px;
    margin-bottom: 6px;
    opacity: 0.6;
  }

  .card-title {
    font-family: 'Orbitron', monospace;
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }

  .card-desc {
    font-size: 1rem;
    font-weight: 600;
    line-height: 1.6;
    color: #8aa0c0;
    margin-bottom: 18px;
  }

  .card-steps {
    list-style: none;
    margin-bottom: 18px;
  }

  .card-steps li {
    padding: 8px 0;
    padding-left: 20px;
    position: relative;
    color: #8aa0c0;
    font-size: 0.95rem;
    font-weight: 600;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .card-steps li::before {
    content: '›';
    position: absolute; left: 0;
    color: var(--cyan);
    font-size: 1.2rem;
    line-height: 1;
    top: 8px;
  }

  /* ===== TIMER ===== */
  .timer-block {
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    margin-bottom: 15px;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .timer-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .timer-display {
    font-family: 'Orbitron', monospace;
    font-size: 3.5rem;
    font-weight: 900;
    color: var(--orange);
    text-shadow: 0 0 30px var(--orange);
    letter-spacing: 4px;
    line-height: 1;
    margin-bottom: 15px;
    transition: color 0.3s;
  }

  .timer-display.done { color: var(--green); text-shadow: 0 0 30px var(--green); }

  .timer-progress {
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 15px;
  }

  .timer-progress-fill {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, var(--orange), var(--red));
    box-shadow: 0 0 10px var(--orange);
    transition: width 1s linear;
  }

  .timer-btn-row { display: flex; gap: 10px; }
  .timer-btn-row .btn { flex: 1; }

  /* ===== VIDEO ===== */
  .video-wrap {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    background: #000;
  }
  .video-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }

  /* ===== COMPLETE BTN ===== */
  .complete-btn {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s;
    border: 2px solid;
    background: transparent;
  }
  .complete-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ===== XP POPUP ===== */
  .xp-popup {
    position: fixed;
    top: 80px; right: 20px;
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 15px var(--gold);
    letter-spacing: 2px;
    animation: popUp 1.8s ease-out forwards;
    z-index: 999;
    pointer-events: none;
  }
  @keyframes popUp {
    0% { opacity: 0; transform: translateY(0); }
    20% { opacity: 1; }
    80% { opacity: 1; transform: translateY(-40px); }
    100% { opacity: 0; transform: translateY(-60px); }
  }

  /* ===== LEVEL UP MODAL ===== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.9);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    animation: fadeIn 0.3s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal-box {
    text-align: center;
    padding: 50px 40px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: 0 0 60px rgba(0,229,255,0.2);
    animation: zoomIn 0.4s cubic-bezier(.4,0,.2,1);
    max-width: 360px; width: 90%;
  }
  @keyframes zoomIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .modal-icon { font-size: 4rem; margin-bottom: 15px; }
  .modal-title {
    font-family: 'Orbitron', monospace;
    font-size: 1.5rem; font-weight: 900;
    color: var(--gold); letter-spacing: 4px;
    text-shadow: 0 0 30px var(--gold);
    margin-bottom: 8px;
  }
  .modal-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 25px; }
  .modal-close {
    padding: 12px 30px;
    border: 2px solid var(--gold); color: var(--gold);
    background: transparent; border-radius: 8px;
    font-family: 'Orbitron', monospace; font-size: 0.65rem;
    letter-spacing: 2px; cursor: pointer; transition: all 0.2s;
  }
  .modal-close:hover { background: var(--gold); color: #000; }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- HUD BAR -->
<div class="hud-bar">
  <div class="hud-logo">VIA AI</div>
  <div class="hud-stats">
    <div class="stat-chip">LVL<span id="lvl-display">1</span></div>
    <div class="xp-track"><div class="xp-fill" id="xp-fill"></div></div>
    <div class="stat-chip">XP<span id="xp-display">0</span></div>
  </div>
</div>

<main>
  <!-- HERO -->
  <div class="hero">
    <div class="hero-title"><span>VIA</span> AI</div>
    <div class="hero-sub">// BOREDOM ELIMINATION SYSTEM v2.0 //</div>
  </div>

  <!-- CATEGORY CHIPS -->
  <div class="category-row">
    <div class="cat-chip" data-cat="football" onclick="quickCat('football')">⚽ Football</div>
    <div class="cat-chip" data-cat="cricket" onclick="quickCat('cricket')">🏏 Cricket</div>
    <div class="cat-chip" data-cat="cooking" onclick="quickCat('cooking')">🍳 Cooking</div>
    <div class="cat-chip" data-cat="exercise" onclick="quickCat('exercise')">💪 Exercise</div>
    <div class="cat-chip" data-cat="sleep" onclick="quickCat('sleep')">😴 Sleep</div>
    <div class="cat-chip" data-cat="mind" onclick="quickCat('mind')">🧠 Mind</div>
    <div class="cat-chip" data-cat="photo" onclick="quickCat('photo')">📸 Photo</div>
    <div class="cat-chip" data-cat="music" onclick="quickCat('music')">🎵 Music</div>
    <div class="cat-chip" data-cat="clean" onclick="quickCat('clean')">🧹 Clean</div>
    <div class="cat-chip" data-cat="tech" onclick="quickCat('tech')">💻 Tech</div>
  </div>

  <!-- INPUT CARD -->
  <div class="input-card">
    <div class="input-row">
      <input type="text" id="userInput" placeholder="Type anything: football, cooking, sleep, cricket..." autocomplete="off">
      <span class="input-icon">🔍</span>
    </div>
    <div class="btn-row">
      <button class="btn btn-a" onclick="processInput('interest')">⚡ Get Activity</button>
      <button class="btn btn-b" onclick="processInput('override')">🎲 Boredom Override</button>
    </div>
    <button class="btn btn-random" onclick="processInput('random')">🔀 Random Mission</button>
  </div>

  <div class="console" id="console"></div>
  <div id="output"></div>
</main>

// ===================== STATE =====================
let xp = parseInt(localStorage.getItem('via_xp') || '0');
let lvl = parseInt(localStorage.getItem('via_lvl') || '1');
let activeTimer = null;
let timerTotal = 0;
let timerRemaining = 0;

updateHUD();

// ===================== LOGIC =====================
function quickCat(cat) {
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
  document.querySelector(`.cat-chip[data-cat="${cat}"]`)?.classList.add('active');
  document.getElementById('userInput').value = cat;
  processInput('interest');
}

async function processInput(mode) {
  const input = document.getElementById('userInput').value.trim().toLowerCase();
  const consoleEl = document.getElementById('console');
  const out = document.getElementById('output');

  if (activeTimer) clearInterval(activeTimer);

  const msgs = [
    '> Booting neural engine...',
    `> Mode: ${mode.toUpperCase()}`,
    '> Cross-referencing activity matrix...',
    '> Generating mission brief...'
  ];

  for (let m of msgs) {
    consoleEl.innerText = m;
    await delay(200);
  }
  consoleEl.innerText = '';

  if (mode === 'random') {
    const allCats = Object.keys(ACTIVITIES);
    const randCat = allCats[Math.floor(Math.random() * allCats.length)];
    const acts = ACTIVITIES[randCat];
    renderActivity(acts[Math.floor(Math.random() * acts.length)]);
    return;
  }

  if (mode === 'override') {
    const o = OVERRIDES[Math.floor(Math.random() * OVERRIDES.length)];
    renderActivity(o);
    return;
  }

  // interest mode
  const cat = detectCategory(input);
  if (cat && ACTIVITIES[cat]) {
    const acts = ACTIVITIES[cat];
    renderActivity(acts[Math.floor(Math.random() * acts.length)]);
  } else {
    // fallback random
    const allCats = Object.keys(ACTIVITIES);
    const randCat = allCats[Math.floor(Math.random() * allCats.length)];
    const acts = ACTIVITIES[randCat];
    renderActivity(acts[Math.floor(Math.random() * acts.length)]);
  }
}

function detectCategory(input) {
  if (!input) return null;
  if (/foot|soccer|goal|dribbl|penalty|striker|midfield/.test(input)) return 'football';
  if (/cricket|bat|bowl|wicket|run|crease|spin|pace/.test(input)) return 'cricket';
  if (/cook|food|recipe|kitchen|eat|chef|meal|bake/.test(input)) return 'cooking';
  if (/exercise|gym|workout|fitness|run|push|pull|squat|hiit|cardio|train/.test(input)) return 'exercise';
  if (/sleep|rest|relax|tired|nap|wind|bed/.test(input)) return 'sleep';
  if (/mind|brain|think|read|study|learn|focus|mental|meditat/.test(input)) return 'mind';
  if (/photo|camera|shoot|lens|pic|selfie/.test(input)) return 'photo';
  if (/music|song|listen|rhythm|beat|album/.test(input)) return 'music';
  if (/clean|organiz|tidy|clutter|dust|wipe/.test(input)) return 'clean';
  if (/tech|digital|phone|computer|app|email|device/.test(input)) return 'tech';
  return null;
}

function renderActivity(act) {
  const out = document.getElementById('output');
  const c = act.color;

  let stepsHTML = '';
  if (act.steps) {
    stepsHTML = `<ul class="card-steps">${act.steps.map(s => `<li>${s}</li>`).join('')}</ul>`;
  }

  let videoHTML = '';
  if (act.video) {
    videoHTML = `<div class="video-wrap"><iframe src="https://www.youtube.com/embed/${act.video}?rel=0" allowfullscreen loading="lazy"></iframe></div>`;
  }

  let timerHTML = '';
  if (act.timer) {
    const mins = Math.floor(act.timer / 60);
    const secs = act.timer % 60;
    const display = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
    timerHTML = `
      <div class="timer-block">
        <div class="timer-label">MISSION TIMER</div>
        <div class="timer-display" id="t-display">${display}</div>
        <div class="timer-progress"><div class="timer-progress-fill" id="t-prog"></div></div>
        <div class="timer-btn-row">
          <button class="btn btn-b" id="t-start" onclick="startTimer(${act.timer}, ${act.xp})">▶ Start Timer</button>
          <button class="btn btn-a" id="t-reset" onclick="resetTimer(${act.timer})">↺ Reset</button>
        </div>
      </div>`;
  }

  out.innerHTML = `
    <div class="activity-card" style="border-left-color:${c}">
      <div class="card-tag" style="color:${c}">${act.tag || 'MISSION'}</div>
      <div class="card-title" style="color:${c}">${act.title}</div>
      <div class="card-desc">${act.desc}</div>
      ${stepsHTML}
      ${videoHTML}
      ${timerHTML}
      <button class="complete-btn" style="border-color:${c};color:${c}" onclick="completeTask(${act.xp}, this)">
        ✓ Mission Complete (+${act.xp} XP)
      </button>
    </div>`;
}

// ===================== TIMER =====================
function startTimer(total, xpVal) {
  if (activeTimer) clearInterval(activeTimer);
  const startBtn = document.getElementById('t-start');
  startBtn.disabled = true;
  startBtn.innerText = '⏱ Running...';

  timerTotal = total;
  timerRemaining = total;

  activeTimer = setInterval(() => {
    timerRemaining--;
    const m = Math.floor(timerRemaining / 60);
    const s = timerRemaining % 60;
    const disp = document.getElementById('t-display');
    const prog = document.getElementById('t-prog');
    if (!disp) { clearInterval(activeTimer); return; }

    disp.innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    const pct = (timerRemaining / timerTotal) * 100;
    prog.style.width = pct + '%';

    if (timerRemaining <= 10) {
      disp.style.color = 'var(--red)';
      disp.style.textShadow = '0 0 30px var(--red)';
    }

    if (timerRemaining <= 0) {
      clearInterval(activeTimer);
      disp.innerText = 'DONE';
      disp.classList.add('done');
      prog.style.width = '0%';
      startBtn.innerText = '✓ Complete';
      addXP(xpVal);
    }
  }, 1000);
}

function resetTimer(total) {
  if (activeTimer) clearInterval(activeTimer);
  const m = Math.floor(total / 60);
  const s = total % 60;
  const disp = document.getElementById('t-display');
  const prog = document.getElementById('t-prog');
  const startBtn = document.getElementById('t-start');
  if (disp) {
    disp.innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    disp.classList.remove('done');
    disp.style.color = 'var(--orange)';
    disp.style.textShadow = '0 0 30px var(--orange)';
  }
  if (prog) prog.style.width = '100%';
  if (startBtn) { startBtn.disabled = false; startBtn.innerText = '▶ Start Timer'; }
}

// ===================== XP =====================
function completeTask(val, btn) {
  btn.disabled = true;
  btn.innerText = '✓ Logged & Synced';
  addXP(val);
}

function addXP(val) {
  xp += val;
  showXPPopup(val);
  if (xp >= 100) {
    xp -= 100;
    lvl++;
    showLevelUp(lvl);
  }
  localStorage.setItem('via_xp', xp);
  localStorage.setItem('via_lvl', lvl);
  updateHUD();
}

function updateHUD() {
  document.getElementById('xp-fill').style.width = xp + '%';
  document.getElementById('xp-display').innerText = xp;
  document.getElementById('lvl-display').innerText = lvl;
}

function showXPPopup(val) {
  const el = document.createElement('div');
  el.className = 'xp-popup';
  el.innerText = `+${val} XP`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1800);
}

function showLevelUp(newLvl) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-icon">⚡</div>
      <div class="modal-title">LEVEL ${newLvl}</div>
      <div class="modal-sub">Operative rank upgraded. Capacity expanded.</div>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">Continue</button>
    </div>`;
  document.body.appendChild(overlay);
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
